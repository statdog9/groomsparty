<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Will You Be My Groomsman?</title>
<style>
  /* ============================================================
     To personalize, scroll to the CONFIG block in the <script>
     near the bottom. Don't touch this styling unless you want to.
     ============================================================ */
  :root{
    --bg:#0f1420; --bg2:#1a2234; --ink:#f4f1ea; --muted:#a9b2c3;
    --gold:#c8a24a; --gold-2:#e7c877; --green:#4caf7d; --red:#c56b6b;
    --card:rgba(255,255,255,.04); --line:rgba(255,255,255,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{
    font-family:"Georgia","Times New Roman",serif;
    background:
      radial-gradient(1200px 700px at 50% -10%, #22304b 0%, transparent 60%),
      linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
    color:var(--ink); min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:24px; overflow-x:hidden;
  }
  .card{
    position:relative; width:100%; max-width:720px;
    background:var(--card); border:1px solid var(--line);
    border-radius:20px; padding:52px 40px 46px; text-align:center;
    backdrop-filter:blur(6px); box-shadow:0 30px 80px rgba(0,0,0,.45);
    overflow:hidden;
  }
  .card::before{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(200,162,74,.10),transparent 40%);pointer-events:none}
  .eyebrow{font-family:"Helvetica Neue",Arial,sans-serif;letter-spacing:.32em;
    text-transform:uppercase;font-size:12px;color:var(--gold-2);margin-bottom:20px}
  .hat{font-size:34px;margin-bottom:4px}
  h1{font-size:clamp(28px,5.5vw,48px);line-height:1.06;margin:8px 0 6px;font-weight:400}
  h1 .name{background:linear-gradient(90deg,var(--gold),var(--gold-2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-style:italic}
  .sub{color:var(--muted);font-size:clamp(15px,2.4vw,18px);line-height:1.6;max-width:50ch;margin:18px auto 6px}

  /* --- code gate --- */
  .gate{margin:26px auto 4px;max-width:360px}
  .gate label{display:block;font-family:"Helvetica Neue",Arial,sans-serif;font-size:12px;
    letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .gate .field{display:flex;gap:10px}
  .gate input{flex:1;font-family:"Helvetica Neue",Arial,sans-serif;font-size:16px;
    padding:14px 16px;border-radius:12px;border:1px solid var(--line);
    background:rgba(0,0,0,.25);color:var(--ink);text-align:center;letter-spacing:.06em}
  .gate input:focus{outline:none;border-color:var(--gold)}
  .gate input.shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
  .gate-msg{min-height:18px;margin-top:12px;font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:13px;color:var(--red)}

  button{font-family:"Helvetica Neue",Arial,sans-serif;font-weight:700;font-size:16px;
    border:none;border-radius:999px;padding:14px 26px;cursor:pointer;white-space:nowrap;
    transition:transform .15s ease, box-shadow .2s ease}
  .btn-gold{background:linear-gradient(90deg,var(--gold),var(--gold-2));color:#20170a;
    box-shadow:0 10px 26px rgba(200,162,74,.32)}
  .btn-gold:hover{transform:translateY(-2px) scale(1.03)}

  /* --- ask panel (per person) --- */
  #ask{display:none}
  #ask.show{display:block;animation:pop .5s ease}
  @keyframes pop{0%{transform:scale(.96);opacity:0}100%{transform:scale(1);opacity:1}}
  .btns{position:relative;margin-top:30px;height:120px}
  #yes-wrap{position:absolute;left:50%;top:50%;transform:translate(-100%,-50%);padding-right:8px}
  #no{background:transparent;color:var(--muted);border:1px solid var(--line);
    position:absolute;left:50%;top:50%;transform:translate(40px,-50%);z-index:1}

  /* --- result panel --- */
  #result{display:none}
  #result.show{display:block;animation:pop .5s ease}
  #result .big{font-size:46px;margin-bottom:4px}
  #result h2{font-size:clamp(24px,4.5vw,38px);margin:8px 0}

  /* --- lineup board --- */
  .lineup-title{font-family:"Helvetica Neue",Arial,sans-serif;letter-spacing:.28em;
    text-transform:uppercase;font-size:12px;color:var(--gold-2);margin:40px 0 22px;
    display:flex;align-items:center;gap:14px;justify-content:center}
  .lineup-title::before,.lineup-title::after{content:"";height:1px;width:44px;background:var(--line)}
  .groom-row{display:flex;justify-content:center;margin-bottom:26px;position:relative}
  .groom-row::after{content:"";position:absolute;left:50%;bottom:-14px;transform:translateX(-50%);
    width:70px;height:1px;background:var(--line)}
  .lineup{display:grid;grid-template-columns:repeat(4,1fr);
    gap:24px 14px;max-width:520px;margin:0 auto}
  @media (max-width:520px){.lineup{grid-template-columns:repeat(2,1fr)}}
  .person{display:flex;flex-direction:column;align-items:center;gap:9px;position:relative}
  .avatar{width:88px;height:88px;border-radius:50%;object-fit:cover;
    border:2px solid var(--line);background:linear-gradient(135deg,#2a3653,#1a2234);
    display:flex;align-items:center;justify-content:center;
    font-family:"Helvetica Neue",Arial,sans-serif;font-weight:700;font-size:30px;color:var(--muted);
    box-shadow:0 8px 20px rgba(0,0,0,.35);transition:filter .6s ease, border-color .4s ease}
  .person .pname{font-size:15px}
  .person .prole{font-family:"Helvetica Neue",Arial,sans-serif;font-size:10.5px;
    letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .badge{font-family:"Helvetica Neue",Arial,sans-serif;font-size:10px;font-weight:700;
    letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:999px;margin-top:1px}

  /* state: groom */
  .person.groom .avatar{border-color:var(--gold-2);box-shadow:0 0 0 4px rgba(200,162,74,.18),0 8px 20px rgba(0,0,0,.4)}
  .person.groom .badge{background:rgba(200,162,74,.16);color:var(--gold-2)}
  /* state: pending (mystery) */
  .person.pend .avatar{filter:none;border-style:dashed;color:var(--muted)}
  .person.pend .pname{color:var(--muted)}
  .person.pend .badge{background:rgba(255,255,255,.06);color:var(--muted)}
  /* state: accepted */
  .person.in .avatar{border-color:var(--green);filter:none;
    box-shadow:0 0 0 4px rgba(76,175,125,.16),0 8px 20px rgba(0,0,0,.4);animation:reveal .7s ease}
  @keyframes reveal{0%{filter:blur(14px);transform:scale(.9)}100%{filter:blur(0);transform:scale(1)}}
  .person.in .badge{background:rgba(76,175,125,.18);color:var(--green)}
  /* state: declined */
  .person.out .avatar{border-color:rgba(197,107,107,.5);filter:grayscale(1) brightness(.7)}
  .person.out .pname{color:var(--muted)}
  .person.out .badge{background:rgba(197,107,107,.16);color:var(--red)}

  .footnote{margin-top:30px;color:var(--muted);font-size:12px;
    font-family:"Helvetica Neue",Arial,sans-serif;letter-spacing:.05em}
  .details{font-family:"Helvetica Neue",Arial,sans-serif;display:flex;gap:24px;justify-content:center;
    flex-wrap:wrap;margin:22px 0 2px;color:var(--muted);font-size:12px;letter-spacing:.05em}
  .details b{color:var(--ink);display:block;font-size:15px;letter-spacing:0;font-family:Georgia,serif}
  .details .dot{opacity:.4}
  canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:50}
  .mode-tag{position:fixed;bottom:10px;right:12px;font-family:Arial,sans-serif;font-size:10px;
    color:var(--muted);opacity:.5}
  @media (max-width:480px){
    .card{padding:40px 20px 38px}
    .btns{height:170px}
    #yes-wrap{transform:translate(-50%,-36px);padding-right:0}
    #no{transform:translate(-50%,44px)}
  }
</style>
</head>
<body>
  <canvas id="confetti"></canvas>
  <div class="card">

    <!-- GATE -->
    <div id="gate">
      <div class="eyebrow" id="eyebrow">The squad is assembling</div>
      <div class="hat">🎩</div>
      <h1 id="gateHeadline">I've got a question for you.</h1>
      <p class="sub" id="gateSub"></p>
      <div class="gate">
        <div class="field">
          <input id="code" autocomplete="off" placeholder="type it here" />
          <button class="btn-gold" id="enter">Enter</button>
        </div>
        <div class="gate-msg" id="gateMsg"></div>
      </div>
    </div>

    <!-- ASK (per person) -->
    <div id="ask">
      <div class="eyebrow">Officially asking</div>
      <div class="hat">🤵</div>
      <h1>Hey <span class="name" id="askName">friend</span>,<br>will you be my <span class="name" id="askRole">groomsman</span>?</h1>
      <p class="sub" id="askPitch"></p>
      <div class="btns">
        <span id="yes-wrap"><button class="btn-gold" id="yes">Absolutely 🤝</button></span>
        <button id="no">Nah</button>
      </div>
    </div>

    <!-- RESULT -->
    <div id="result">
      <div class="big" id="resultBig">🎉</div>
      <h2 id="resultTitle"></h2>
      <p class="sub" id="resultMsg"></p>
    </div>

    <!-- DETAILS + LIVE BOARD (always visible) -->
    <div class="details" id="details">
      <div><span>When</span><b id="date"></b></div>
      <div class="dot">•</div>
      <div><span>Where</span><b id="place"></b></div>
    </div>
    <div id="board" style="display:none">
      <div class="lineup-title" id="lineupTitle">The Lineup</div>
      <div class="groom-row" id="groomRow"></div>
      <div class="lineup" id="lineup"></div>
    </div>
  </div>
  <div class="mode-tag" id="modeTag"></div>

/* ---------------- backend layer (Supabase or demo) ---------------- */
const DEMO = CONFIG.SUPABASE_URL.startsWith("YOUR_") || CONFIG.SUPABASE_KEY.startsWith("YOUR_");
document.getElementById('modeTag').textContent = DEMO ? "demo mode (responses saved on this device only)" : "live";
// Build auth headers. Legacy anon keys are JWTs (start with 'eyJ') and need a Bearer token;
// the newer sb_publishable_ keys authenticate via the apikey header only.
function sbHeaders(extra){
  const h = { apikey: CONFIG.SUPABASE_KEY };
  if(CONFIG.SUPABASE_KEY.startsWith('eyJ')) h.Authorization = 'Bearer ' + CONFIG.SUPABASE_KEY;
  return Object.assign(h, extra||{});
}

const api = {
  async getAll(){
    if(DEMO){
      const raw = localStorage.getItem('gm_status');
      return raw ? JSON.parse(raw) : {};
    }
    const r = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/groomsmen?select=code,status`, {
      headers: sbHeaders()
    });
    const rows = await r.json();
    const map = {}; (rows||[]).forEach(x=>map[x.code]=x.status); return map;
  },
  async set(code, status){
    if(DEMO){
      const raw = localStorage.getItem('gm_status');
      const map = raw ? JSON.parse(raw) : {};
      map[code] = status; localStorage.setItem('gm_status', JSON.stringify(map)); return;
    }
    await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/groomsmen?code=eq.${encodeURIComponent(code)}`, {
      method:'PATCH',
      headers: sbHeaders({ 'Content-Type':'application/json', Prefer:'return=minimal' }),
      body: JSON.stringify({ status })
    });
  }
};

/* ---------------- static text ---------------- */
document.getElementById('eyebrow').textContent = CONFIG.gateHeadline ? "The squad is assembling" : "";
document.getElementById('gateHeadline').textContent = CONFIG.gateHeadline;
document.getElementById('gateSub').textContent = CONFIG.gateSub;
document.getElementById('askPitch').textContent = CONFIG.pitch;
document.getElementById('lineupTitle').textContent = CONFIG.lineupTitle;
document.getElementById('date').textContent = CONFIG.date;
document.getElementById('place').textContent = CONFIG.place;
if(!CONFIG.showDetails) document.getElementById('details').style.display='none';

/* ---------------- board rendering ---------------- */
function initials(n){return (n||"?").replace(/[^A-Za-z ]/g,"").split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("")||"?";}
let statuses = {};
const lineupEl = document.getElementById('lineup');
const groomEl = document.getElementById('groomRow');

function avatarHTML(name, photo){
  if(photo) return `<img class="avatar" src="${photo}" alt="${name}" onerror="this.outerHTML='<div class=&quot;avatar&quot;>${initials(name)}</div>'">`;
  return `<div class="avatar">${initials(name)}</div>`;
}
function renderBoard(){
  // groom on his own centered row up top
  groomEl.innerHTML = `<div class="person groom">${avatarHTML(CONFIG.groom.name, CONFIG.groom.photo)}
    <div class="pname">${CONFIG.groom.name}</div><div class="prole">The Groom</div>
    <div class="badge">That's me</div></div>`;
  let html = "";
  CONFIG.roster.forEach(p=>{
    const s = statuses[p.code] || 'pending';
    if(s==='accepted'){
      html += `<div class="person in">${avatarHTML(p.name,p.photo)}
        <div class="pname">${p.name}</div><div class="prole">${p.role}</div>
        <div class="badge">In ✓</div></div>`;
    } else if(s==='declined'){
      html += `<div class="person out">${avatarHTML(p.name,p.photo)}
        <div class="pname">${p.name}</div><div class="prole">${p.role}</div>
        <div class="badge">Out</div></div>`;
    } else {
      html += `<div class="person pend"><div class="avatar">?</div>
        <div class="pname">???</div><div class="prole">${p.role}</div>
        <div class="badge">Pending…</div></div>`;
    }
  });
  lineupEl.innerHTML = html;
}
let lastKey = null;
async function refresh(force){
  try{ statuses = await api.getAll(); }catch(e){}
  const key = JSON.stringify(statuses);
  if(force || key !== lastKey){ lastKey = key; renderBoard(); } // only re-render (and replay animation) on real changes
}
refresh(true);
setInterval(refresh, 4000); // live-ish updates

/* ---------------- code gate ---------------- */
let currentPerson = null;
const codeInput = document.getElementById('code');
const gateMsg = document.getElementById('gateMsg');

function tryCode(){
  const val = codeInput.value.trim().toLowerCase();
  const match = CONFIG.roster.find(p => p.code.toLowerCase() === val);
  if(!match){
    codeInput.classList.remove('shake'); void codeInput.offsetWidth; codeInput.classList.add('shake');
    gateMsg.textContent = `Hmm, that code doesn't match. Double-check with ${CONFIG.yourName}.`;
    return;
  }
  currentPerson = match;
  const already = statuses[match.code];
  if(already==='accepted' || already==='declined'){
    showResult(already==='accepted');
    return;
  }
  // show personalized ask
  document.getElementById('gate').style.display='none';
  document.getElementById('askName').textContent = match.name.split(/\s+/)[0];
  document.getElementById('askRole').textContent = match.role;
  document.getElementById('ask').classList.add('show');
}
document.getElementById('enter').addEventListener('click', tryCode);
codeInput.addEventListener('keydown', e=>{ if(e.key==='Enter') tryCode(); });

/* ---------------- ask: yes / dodging no ---------------- */
const no = document.getElementById('no');
const nags = ["Nah","You sure? 😳","Wrong button","Try again 😅","Can't catch me!","It's a yes 😏",
  "Nope nope nope","Stop it 😂","Not today","Missed me","Nice try","Never gonna happen",
  "lol no","Keep dreaming","Too slow 🐢","Denied","🚫","Give up yet?"];
let nagI = 0;
function dodge(){
  const pad=14, maxX=innerWidth-no.offsetWidth-pad, maxY=innerHeight-no.offsetHeight-pad;
  no.style.position='fixed';
  no.style.left=Math.max(pad,Math.random()*maxX)+'px';
  no.style.top=Math.max(pad,Math.random()*maxY)+'px';
  no.style.transform='none';
  nagI=(nagI+1)%nags.length; no.textContent=nags[nagI];
}
no.addEventListener('mouseenter',dodge);
no.addEventListener('click', e=>{ e.preventDefault(); dodge(); });
no.addEventListener('touchstart', e=>{e.preventDefault(); dodge();}, {passive:false});

document.getElementById('yes').addEventListener('click', ()=>respond(true));

async function respond(accepted){
  await api.set(currentPerson.code, accepted ? 'accepted' : 'declined');
  statuses[currentPerson.code] = accepted ? 'accepted' : 'declined';
  showResult(accepted);
}
function showResult(accepted){
  document.getElementById('gate').style.display='none';
  document.getElementById('ask').classList.remove('show');
  const r = document.getElementById('result');
  document.getElementById('resultBig').textContent = accepted ? '🎉🥂🎉' : '🤝';
  document.getElementById('resultTitle').textContent = accepted ? CONFIG.acceptTitle : CONFIG.declineTitle;
  document.getElementById('resultMsg').textContent = accepted ? CONFIG.acceptMsg : CONFIG.declineMsg;
  r.classList.add('show');
  if(accepted){
    document.getElementById('board').style.display='block';  // reveal the squad only after they're in
    burst();
  }
  refresh(true);
}

/* ---------------- confetti ---------------- */
const cv=document.getElementById('confetti'), ctx=cv.getContext('2d');
let parts=[]; function size(){cv.width=innerWidth;cv.height=innerHeight} size(); addEventListener('resize',size);
const cols=['#c8a24a','#e7c877','#4caf7d','#3b6ea5','#f4f1ea'];
function burst(){for(let i=0;i<260;i++){var ball=Math.random()<0.22; parts.push({x:innerWidth/2,y:innerHeight/3,
  vx:(Math.random()-.5)*11,vy:Math.random()*-11-2,g:.12+Math.random()*.06,
  s: ball ? 13+Math.random()*6 : 6+Math.random()*6,
  rot:Math.random()*6,vr:(Math.random()-.5)*.2,
  c: ball ? '#d6e84a' : cols[(Math.random()*cols.length)|0],
  ball:ball, life:320});}}
function drawBall(r){
  ctx.fillStyle='#d6e84a'; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#f5f7ff'; ctx.lineWidth=Math.max(1,r*0.16);
  ctx.beginPath(); ctx.arc(-r*0.95,0,r*1.15,-0.85,0.85); ctx.stroke();
  ctx.beginPath(); ctx.arc(r*0.95,0,r*1.15,Math.PI-0.85,Math.PI+0.85); ctx.stroke();
}
function loop(){ctx.clearRect(0,0,cv.width,cv.height);
  parts.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.life--;
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    if(p.ball){ drawBall(p.s/2); }
    else { ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6); }
    ctx.restore();});
  parts=parts.filter(p=>p.life>0&&p.y<cv.height+40);requestAnimationFrame(loop);}
loop();
</script>
